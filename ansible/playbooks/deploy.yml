---
- name: Deploy Pokedex app with Docker through SSM
  hosts: aws_ec2
  become: true
  gather_facts: true

  vars:
    app_name: pokedex-ci-cd-lab
    app_dir: /opt/pokedex-ci-cd-lab
    image_name: pokedex-ci-cd-lab
    container_name: pokedex-ci-cd-lab
    caddy_container_name: caddy
    container_port: 3000
    local_bundle_dir: /tmp/pokedex-deploy-bundle
    domain_name: pokedex.badiscloud.fr
    caddy_dir: /opt/caddy
    docker_network_name: pokedex-network

  tasks:
    - name: Install Docker
      ansible.builtin.dnf:
        name: docker
        state: present

    - name: Enable and start Docker
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started

    - name: Create application directory
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        owner: ec2-user
        group: ec2-user
        mode: "0755"

    - name: Copy Dockerfile
      ansible.builtin.copy:
        src: ../../Dockerfile
        dest: "{{ app_dir }}/Dockerfile"
        owner: ec2-user
        group: ec2-user
        mode: "0644"

    - name: Copy Docker ignore file
      ansible.builtin.copy:
        src: ../../.dockerignore
        dest: "{{ app_dir }}/.dockerignore"
        owner: ec2-user
        group: ec2-user
        mode: "0644"

    - name: Remove existing local deployment bundle
      ansible.builtin.file:
        path: "{{ local_bundle_dir }}"
        state: absent
      delegate_to: localhost
      become: false

    - name: Create local deployment bundle directory
      ansible.builtin.file:
        path: "{{ local_bundle_dir }}/app"
        state: directory
        mode: "0755"
      delegate_to: localhost
      become: false

    - name: Copy app source into local deployment bundle
      ansible.builtin.command:
        cmd: >
          cp -R
          /workspace/app/package.json
          /workspace/app/package-lock.json
          /workspace/app/src
          /workspace/app/public
          /workspace/app/views
          {{ local_bundle_dir }}/app
      delegate_to: localhost
      become: false
      changed_when: true

    - name: Copy local deployment bundle to EC2
      ansible.builtin.copy:
        src: "{{ local_bundle_dir }}/app/"
        dest: "{{ app_dir }}/app/"
        owner: ec2-user
        group: ec2-user
        mode: preserve

    - name: Build Docker image
      ansible.builtin.command:
        cmd: "docker build -t {{ image_name }}:latest ."
        chdir: "{{ app_dir }}"
      changed_when: true

    - name: Remove existing application container if present
      ansible.builtin.command:
        cmd: "docker rm -f {{ container_name }}"
      register: remove_app_container
      failed_when: false
      changed_when: remove_app_container.rc == 0

    - name: Remove existing Caddy container if present
      ansible.builtin.command:
        cmd: "docker rm -f {{ caddy_container_name }}"
      register: remove_caddy_container
      failed_when: false
      changed_when: remove_caddy_container.rc == 0

    - name: Create Docker network
      ansible.builtin.command:
        cmd: "docker network create {{ docker_network_name }}"
      register: create_network
      failed_when: create_network.rc != 0 and "already exists" not in create_network.stderr
      changed_when: create_network.rc == 0

    - name: Run application container in Docker network
      ansible.builtin.command:
        cmd: >
          docker run -d
          --name {{ container_name }}
          --network {{ docker_network_name }}
          --restart unless-stopped
          {{ image_name }}:latest
      changed_when: true

    - name: Create Caddy directory
      ansible.builtin.file:
        path: "{{ caddy_dir }}"
        state: directory
        owner: ec2-user
        group: ec2-user
        mode: "0755"

    - name: Create Caddy data directory
      ansible.builtin.file:
        path: "{{ caddy_dir }}/data"
        state: directory
        owner: ec2-user
        group: ec2-user
        mode: "0755"

    - name: Create Caddy config directory
      ansible.builtin.file:
        path: "{{ caddy_dir }}/config"
        state: directory
        owner: ec2-user
        group: ec2-user
        mode: "0755"

    - name: Configure Caddy reverse proxy
      ansible.builtin.copy:
        dest: "{{ caddy_dir }}/Caddyfile"
        owner: ec2-user
        group: ec2-user
        mode: "0644"
        content: |
          {{ domain_name }} {
              reverse_proxy {{ container_name }}:{{ container_port }}
          }

    - name: Run Caddy container
      ansible.builtin.command:
        cmd: >
          docker run -d
          --name {{ caddy_container_name }}
          --network {{ docker_network_name }}
          --restart unless-stopped
          -p 80:80
          -p 443:443
          -v {{ caddy_dir }}/Caddyfile:/etc/caddy/Caddyfile:ro
          -v {{ caddy_dir }}/data:/data
          -v {{ caddy_dir }}/config:/config
          caddy:2
      changed_when: true

    - name: Verify application health endpoint from Docker network
      ansible.builtin.command:
        cmd: >
          docker run --rm
          --network {{ docker_network_name }}
          curlimages/curl:latest
          http://{{ container_name }}:{{ container_port }}/health
      changed_when: false